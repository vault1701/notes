{{define "title"}}Note #{{.Note.ID}}{{end}}

{{define "main"}}
<div id="note-edit">
    {{if .IsAuthenticated}}
    <a href="/note/edit/{{.Note.ID}}"><button>Edit</button></a>

    <form action='/note/delete/{{.Note.ID}}' method='POST'>
        <input type='hidden' name='csrf_token' value='{{.CSRFToken}}'>
        <button>Delete</button>
    </form>
    {{end}}
</div>
<div id="note">
    <pre>{{.Note.ContentMD}}</pre>
</div>
{{end}}
